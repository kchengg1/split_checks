name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  core-tests:
    name: SplitChecksCore tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run test suite
        run: swift test --package-path SplitChecksCore

  app-build:
    name: App build (simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen
      - name: Build for iOS Simulator (no signing)
        run: |
          xcodebuild -project SplitChecks.xcodeproj -scheme SplitChecks \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO build

  ipa:
    name: Unsigned IPA (for sideloading)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen
      - name: Build for iOS device (unsigned, Release)
        run: |
          xcodebuild -project SplitChecks.xcodeproj -scheme SplitChecks \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO build
      - name: Package IPA
        run: |
          mkdir Payload
          cp -R build/Build/Products/Release-iphoneos/SplitChecks.app Payload/
          zip -qry SplitChecks.ipa Payload
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SplitChecks-ipa
          path: SplitChecks.ipa
